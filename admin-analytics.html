<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>The Word 365 Analytics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,sans-serif;background:#f5f5f0;padding:2rem}h1{font-size:22px;margin-bottom:4px}.sub{font-size:13px;color:#888;margin-bottom:2rem}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:2rem}.card{background:#fff;border-radius:12px;padding:1.25rem;border:1px solid #e8e8e4}.lbl{font-size:12px;color:#888;text-transform:uppercase;margin-bottom:6px}.val{font-size:32px;font-weight:600}.box{background:#fff;border-radius:12px;padding:1.25rem;border:1px solid #e8e8e4;margin-bottom:2rem}.box h2{font-size:15px;margin-bottom:1rem}.row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0ec;font-size:13px;align-items:center}.b{padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}.bn{background:#e8f5e9;color:#2e7d32}.br{background:#e3f2fd;color:#1565c0}.vid{flex:1;color:#555;font-family:monospace;font-size:12px}.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}button{background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:8px 18px;cursor:pointer}.gold{color:#C9A84C}@media(max-width:600px){.grid{grid-template-columns:1fr}body{padding:1rem}}</style>
</head><body>
<div class="hdr"><div><h1>The Word 365 <span class="gold">*</span></h1><p class="sub">Visitor Analytics</p></div><button onclick="load()">Refresh</button></div>
<div class="grid"><div class="card"><div class="lbl">Total Visits</div><div class="val" id="tv">-</div></div><div class="card"><div class="lbl">Unique Visitors</div><div class="val" id="uv">-</div></div><div class="card"><div class="lbl">Return Visitors</div><div class="val" id="rv">-</div></div></div>
<div class="box"><h2>Visits per visitor</h2><div style="position:relative;width:100%;height:200px"><canvas id="c"></canvas></div></div>
<div class="box"><h2>Recent visits</h2><div id="list">Loading...</div><p id="s" style="color:#aaa;font-size:12px;margin-top:1rem;text-align:right"></p></div>
<script>
const U="https://fnlcwwqltqksowtlefpb.supabase.co",K="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZubGN3d3FsdHFrc293dGxlZnBiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzUxOTMsImV4cCI6MjA5MTUxMTE5M30.Es_dkmm0_DNgPPdX5BiP5vtrMUBHmyrPB70Raplqblw";
let ch=null;
async function load(){
  document.getElementById("s").textContent="Refreshing...";
  try{
    const r=await fetch(U+"/rest/v1/visits?select=*&order=visited_at.desc",{headers:{apikey:K,Authorization:"Bearer "+K}});
    const d=await r.json();
    const m={};d.forEach(x=>m[x.visitor_id]=(m[x.visitor_id]||0)+1);
    document.getElementById("tv").textContent=d.length;
    document.getElementById("uv").textContent=Object.keys(m).length;
    document.getElementById("rv").textContent=Object.values(m).filter(v=>v>1).length;
    if(ch)ch.destroy();
    ch=new Chart(document.getElementById("c"),{type:"bar",data:{labels:Object.keys(m).map((x,i)=>"Visitor "+(i+1)),datasets:[{data:Object.values(m),backgroundColor:"#C9A84C",borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});
    document.getElementById("list").innerHTML=d.length?d.slice(0,20).map(x=>{const dt=x.visited_at?new Date(x.visited_at).toLocaleString():"Just now";const n=x.visit_number===1;return `<div class="row"><span class="b ${n?"bn":"br"}">${n?"new":"return"}</span><span class="vid">${x.visitor_id}</span><span style="color:#888">visit #${x.visit_number||"-"}</span><span style="color:#bbb;font-size:11px">${dt}</span></div>`}).join(""):"<p style=\"color:#aaa\">No visits yet.</p>";
    document.getElementById("s").textContent="Last updated: "+new Date().toLocaleTimeString();
  }catch(e){document.getElementById("s").textContent="Error";}
}
load();
</script></body></html>
